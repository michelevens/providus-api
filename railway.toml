[build]
builder = "nixpacks"

[deploy]
startCommand = "bash -c 'php artisan migrate --force; php artisan promote-superadmin admin@credentik.com || true; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"
healthcheckPath = "/up"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[build]
builder = "nixpacks"

[deploy]
startCommand = "bash -c 'php artisan config:clear; php artisan route:clear; php artisan cache:clear; php artisan migrate --force; php artisan db:seed --class=DemoUserSeeder --force; (while true; do php artisan schedule:run >> /tmp/schedule.log 2>&1; sleep 60; done) & (while true; do php artisan queue:work --tries=5 --timeout=60 --sleep=3 --max-time=3600 >> /tmp/queue.log 2>&1; done) & php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"
healthcheckPath = "/up"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
